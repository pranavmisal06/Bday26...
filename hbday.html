<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💙</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* PAGES */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  color: white;
}

.active {
  display: flex;
}

/* PAGE 1 */
#page1 {
  background: url('Birthday Photo Collage Canvas Print in Teal Light Blue Polaroid Style 2.png') center/cover no-repeat;
}

/* VIDEO */
video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* VIDEO BUTTONS */
.controls {
  position: absolute;
  bottom: 40px;
  display: none;
  gap: 15px;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #00c6ff;
  color: black;
  font-size: 16px;
}

/* PAGE 3 */
#page3 {
  position: relative;
}

/* BLUR BG */
#blurbg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#a8d8ff,#6fb1fc,#3a7bd5);
  filter: blur(40px);
  z-index: -2;
}

#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,50,0.5);
  z-index: -1;
}

/* MESSAGE */
.message {
  width: 85%;
  font-size: 18px;
  line-height: 1.8;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
}

.message p {
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- PAGE 1 (CLICK ANYWHERE) -->
<div id="page1" class="page active" onclick="nextPage(2)"></div>

<!-- PAGE 2 (VIDEO) -->
<div id="page2" class="page">
  <video id="myVideo" src="1604.mp4" playsinline></video>

  <div class="controls" id="controls">
    <button onclick="replay()">Replay</button>
    <button onclick="nextPage(3)">Next</button>
  </div>
</div>

<!-- PAGE 3 (MESSAGE) -->
<div id="page3" class="page">
  <div id="blurbg"></div>
  <div id="overlay"></div>

  <div class="message">
    <p>I don’t say this often…</p>
    <p>But u know u are important to me 💙</p>
    <p>I don't know how to describe my feeling but u understand everytime,<br>Thanks for being in my Life 🥺</p>
    <p>Shayad zyada photos nahi hai…<br>Per ab jyda nakhre mat kr itne me khush Reh ✨</p>
    <p>Ab jyda smile mt kr </p>
    <p>Happy Birthday Once Again ❤️</p>
  </div>
</div>

</div>

<script>

function nextPage(num) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + num).classList.add('active');

  if(num === 2){
    let v = document.getElementById("myVideo");
    v.currentTime = 0;
    v.play();

    // show buttons after video ends
    v.onended = function(){
      document.getElementById("controls").style.display = "flex";
    };
  }
}

function replay(){
  let v = document.getElementById("myVideo");
  document.getElementById("controls").style.display = "none";
  v.currentTime = 0;
  v.play();
}

</script>

</body>
</html>
